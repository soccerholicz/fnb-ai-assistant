# Fly.io deploy config for the @jav/api Fastify server.
# App name is created on first deploy: `fly launch --no-deploy` or `fly apps create`.
# See DEPLOYMENT.md for the one-time setup and how the CI deploy job uses this.

app = "fnb-ai-assistant-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
